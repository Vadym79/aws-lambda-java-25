AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AWSLambdaDurableFunctionsOrchS3FilesJava25 
  Sample SAM Template

Parameters:
  Stage:
    Type: String
    Default: prod

Globals:
  Function:
    CodeUri: target/aws-lambda-durable-functions-orch-s3files-java-25-1.0.0-SNAPSHOT.jar
    Runtime: java25
    #SnapStart:
      #ApplyOn: PublishedVersions
    Timeout: 30 
    MemorySize: 1024
    Architectures:
      #- arm64
      - x86_64  
    #Tracing: Active
    Environment:
      Variables:
        #JAVA_TOOL_OPTIONS: "-XX:+TieredCompilation -XX:TieredStopAtLevel=1"
        WORKSPACE_MOUNT: /mnt/workspace
        S3_BUCKET_NAME: !Ref WorkspaceBucket
        S3_FOLDER_NAME: lambda
        REGION: !Sub ${AWS::Region}
        
             
Resources:
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      #TracingEnabled: true
      Name: AWSLambdaDurableFunctionsOrchS3FilesJava25API
      Description: API for AWSLambdaDurableFunctionsOrchS3FilesJava25
      AccessLogSetting:
        DestinationArn: !Sub ${MyApiLogGroup.Arn} # This Log Group is already created within our SAM Template
        Format: "{'integrationLatency':'$context.integrationLatency', 'latency':'$context.responseLatency', 'requestId':'$context.requestId', 'ip': '$context.identity.sourceIp', 'caller':'$context.identity.caller', 'user':'$context.identity.user','requestTime':'$context.requestTime', 'xrayTraceId':'$context.xrayTraceId', 'wafResponseCode':'$context.wafResponseCode', 'httpMethod':'$context.httpMethod','resourcePath':'$context.resourcePath', 'status':'$context.status','protocol':'$context.protocol', 'responseLength':'$context.responseLength' }"
      MethodSettings:
        - MetricsEnabled: True
          ResourcePath: '/*'
          HttpMethod: '*'
      Auth:
        ApiKeyRequired: true  # sets for all methods


  MyApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${MyApi}"
      RetentionInDays: 7

  MyApiUsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn:
      - MyApiStage
    Properties:
      ApiStages:
        - ApiId: !Ref MyApi
          Stage: !Ref Stage
      UsagePlanName: AWSLambdaDurableFunctionsOrchS3FilesJava25UsagePlan
      Description: Usage plan for AAWSLambdaDurableFunctionsOrchS3FilesJava25API
      Quota:
        Limit: 100
        Period: DAY
      Throttle:
        RateLimit:  10
        BurstLimit: 50

  MyApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn:
      - MyApiStage
    Properties:
      Name: "AWSLambdaDurableFunctionsOrchS3FilesJava25APIKey"
      Description: "AWSLambdaDurableFunctionsOrchS3FilesJava25 API Key"
      Enabled: true
      GenerateDistinctId: false
      Value: a6ZbcDefQW12BN56VwsAl
      StageKeys:
        - RestApiId: !Ref MyApi
          StageName: !Ref Stage

  MyApiUsagePlanKey:
    Type: "AWS::ApiGateway::UsagePlanKey"
    DependsOn:
      - MyApi
    Properties:
      KeyId: !Ref MyApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref MyApiUsagePlan


  NetworkingStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: src/main/resources/stacks/network.yaml

  WorkspaceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName : vadym-orch-s3files-workspace
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  S3FilesRole:
    Type: AWS::IAM::Role
    Properties:
      Path: /service-role/
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowS3FilesAssumeRole
            Effect: Allow
            Principal:
              Service: elasticfilesystem.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
              ArnLike:
                aws:SourceArn: !Sub 'arn:aws:s3files:${AWS::Region}:${AWS::AccountId}:file-system/*'
      Policies:
        - PolicyName: S3FilesBucketAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3BucketPermissions
                Effect: Allow
                Action:
                  - s3:ListBucket*
                Resource: !GetAtt WorkspaceBucket.Arn
                Condition:
                  StringEquals:
                    aws:ResourceAccount: !Ref AWS::AccountId
              - Sid: S3ObjectPermissions
                Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:DeleteObject*
                  - s3:GetObject*
                  - s3:List*
                  - s3:PutObject*
                Resource: !Sub '${WorkspaceBucket.Arn}/*'
                Condition:
                  StringEquals:
                    aws:ResourceAccount: !Ref AWS::AccountId

  S3FileSystem:
    Type: AWS::S3Files::FileSystem
    Properties:
      Bucket: !GetAtt WorkspaceBucket.Arn
      RoleArn: !GetAtt S3FilesRole.Arn
      AcceptBucketWarning: true

  MountTargetA:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !GetAtt S3FileSystem.FileSystemId
      SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetAId
      SecurityGroups:
        - !GetAtt NetworkingStack.Outputs.MountTargetSGId

  MountTargetB:
    Type: AWS::S3Files::MountTarget
    Properties:
      FileSystemId: !GetAtt S3FileSystem.FileSystemId
      SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetBId
      SecurityGroups:
        - !GetAtt NetworkingStack.Outputs.MountTargetSGId

  S3FilesAccessPoint:
    Type: AWS::S3Files::AccessPoint
    Properties:
      FileSystemId: !GetAtt S3FileSystem.FileSystemId
      PosixUser:
        Uid: '1000'
        Gid: '1000'
      RootDirectory:
        Path: /lambda
        CreationPermissions:
          OwnerUid: '1000'
          OwnerGid: '1000'
          Permissions: '755'


  AuthorContentExtractorFunction:
    Type: AWS::Serverless::Function
    DependsOn:
      - MountTargetA
      - MountTargetB
    Properties:
      FunctionName: AuthorContentExtractorOrch
      #AutoPublishAlias: liveVersion
      Handler: dev.vkazulkin.handler.AuthorContentExtractor::handleRequest
      Environment:
        Variables:
          UpcomingTalkContentExtractorFunctionArn: !GetAtt UpcomingTalkContentExtractorFunction.Arn
          YouTubeContentExtractorFunctionArn: !GetAtt YouTubeContentExtractorFunction.Arn

      DurableConfig:
        ExecutionTimeout: 3600
        RetentionPeriodInDays: 7
      VpcConfig:
        SecurityGroupIds:
          - !GetAtt NetworkingStack.Outputs.LambdaSGId
        SubnetIds:
          - !GetAtt NetworkingStack.Outputs.PrivateSubnetAId
          - !GetAtt NetworkingStack.Outputs.PrivateSubnetBId
      FileSystemConfigs:
        - Arn: !GetAtt S3FilesAccessPoint.AccessPointArn
          LocalMountPath: /mnt/workspace
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Sid: MountS3Files
              Effect: Allow
              Action:
                - s3files:ClientMount
                - s3files:ClientWrite
                - s3files:ClientRootAccess
              Resource: !GetAtt S3FileSystem.FileSystemArn
            - Sid: InvokeLambda
              Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                  - !GetAtt YouTubeContentExtractorFunction.Arn
                  - !Sub '${YouTubeContentExtractorFunction.Arn}:*'
                  - !GetAtt UpcomingTalkContentExtractorFunction.Arn
                  - !Sub '${UpcomingTalkContentExtractorFunction.Arn}:*'


  AuthorContentExtractorFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AuthorContentExtractorFunction}"
      RetentionInDays: 7


  GetAuthorContentResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetAuthorContentResultOrch
      #AutoPublishAlias: liveVersion
      Handler: dev.vkazulkin.handler.GetAuthorContentResult::handleRequest
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref WorkspaceBucket
      Events:
        GetRequestById:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /author/content/result/{firstname}/{lastname}
            Method: get

  GetAuthorContentResultFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GetAuthorContentResultFunction}"
      RetentionInDays: 7

  YouTubeContentExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: YouTubeContentExtractor
      #AutoPublishAlias: liveVersion
      Handler: dev.vkazulkin.handler.YouTubeContentExtractor::handleRequest


  YouTubeContentExtractorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${YouTubeContentExtractorFunction}"
      RetentionInDays: 7

  UpcomingTalkContentExtractorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UpcomingTalkContentExtractor
      #AutoPublishAlias: liveVersion
      Handler: dev.vkazulkin.handler.UpcomingTalkContentExtractor::handleRequest


  UpcomingTalkContentExtractorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${UpcomingTalkContentExtractorFunction}"
      RetentionInDays: 7

Outputs:
  AWSLambdaDurableFunctionsOrchS3FilesJava25APIEndpoint:
    Description: "API Gateway endpoint URL for Prod stage for AWS Lambda Durable Functions as Orechstrator S3Files and java 25"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
